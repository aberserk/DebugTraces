name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  quick-check:
    name: Quick Quality Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build gcc-12 g++-12 clang-15 clang-tidy-15 libc++-15-dev libc++abi-15-dev
        # Remove any existing GCC 14 to avoid conflicts
        sudo apt-get remove -y gcc-14 g++-14 2>/dev/null || true
        # Use GCC 12 for better C++20 compatibility
        sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 100
        sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-12 100
        # Ensure clang++-15 exists
        if [ ! -f /usr/bin/clang++-15 ]; then
          sudo ln -sf /usr/bin/clang-15 /usr/bin/clang++-15
        fi
        # Verify compiler version
        gcc --version
        # Create symlinks for default clang-tidy command
        sudo ln -sf /usr/bin/clang-tidy-15 /usr/bin/clang-tidy
        
    - name: Configure debug build
      run: cmake --preset dev-debug
      
    - name: Build debug
      run: cmake --build build/dev-debug
      
    - name: Run tests
      run: |
        cd build/dev-debug
        ctest --output-on-failure --timeout 30
        
    - name: Quick static analysis
      run: |
        echo "Temporarily disabled due to GCC 14 template instantiation issues"
        echo "Will re-enable once GCC 12 enforcement is working properly"
        # cmake --preset clang-tidy
        # cmake --build build/clang-tidy --target dbgtracing
      continue-on-error: true  # Don't fail CI on warnings
      
    - name: Check compilation (Release)  
      run: |
        cmake --preset dev-release
        cmake --build build/dev-release
        
  format-check:
    name: Code Format Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install clang-format
      run: sudo apt-get install -y clang-format-15
      
    - name: Check code formatting
      run: |
        # Check if files exist first, then format check
        if find src tests -name '*.cpp' -o -name '*.h' | head -1 | read; then
          find src tests -name '*.cpp' -o -name '*.h' | xargs clang-format-15 --style=file:cmake/.clang-format --dry-run || true
        else
          echo "No C++ files found to format check"
        fi
      continue-on-error: true  # Don't fail CI on formatting issues